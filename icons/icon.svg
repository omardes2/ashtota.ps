<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a7cc4"/>
      <stop offset="1" stop-color="#0d5c9c"/>
    </linearGradient>
    <linearGradient id="milk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f4fd"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3f2"/>
      <stop offset="1" stop-color="#39a8e0"/>
    </linearGradient>
  </defs>
  <!-- خلفية درع أزرق -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- قطرة لبن كبيرة بيضاء -->
  <path d="M256 116 C 320 210, 372 262, 372 322 a116 116 0 0 1 -232 0 C 140 262, 192 210, 256 116 Z" fill="url(#milk)"/>
  <!-- لمعة داخل القطرة -->
  <path d="M212 300 a44 60 0 0 0 44 60" fill="none" stroke="#bfe4f8" stroke-width="14" stroke-linecap="round"/>
  <!-- قطرات صغيرة -->
  <circle cx="150" cy="180" r="16" fill="url(#drop)"/>
  <circle cx="372" cy="200" r="12" fill="url(#drop)"/>
</svg>
