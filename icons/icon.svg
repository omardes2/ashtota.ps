<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a4f38"/>
      <stop offset="1" stop-color="#5b3a29"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5e7cf"/>
      <stop offset="1" stop-color="#fbf3e4"/>
    </linearGradient>
    <linearGradient id="caramel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0a95c"/>
      <stop offset="1" stop-color="#c9873f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- plate -->
  <ellipse cx="256" cy="360" rx="150" ry="34" fill="url(#cream)"/>
  <!-- pudding body -->
  <path d="M150 250 q106 -46 212 0 l-24 96 q-82 34 -164 0 z" fill="url(#cream)"/>
  <!-- caramel top -->
  <path d="M150 250 q106 -70 212 0 q-106 44 -212 0 z" fill="url(#caramel)"/>
  <!-- caramel drip -->
  <path d="M256 214 c26 0 40 22 40 40 c0 8 -80 8 -80 0 c0 -18 14 -40 40 -40 z" fill="#c9873f"/>
  <!-- cherry -->
  <circle cx="256" cy="196" r="20" fill="#d9534f"/>
  <rect x="252" y="150" width="8" height="40" rx="4" fill="#3f9d6b"/>
</svg>
